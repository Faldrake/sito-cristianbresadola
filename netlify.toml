# Netlify config - cristianbresadola.com
# Audit sicurezza 9/05/2026: aggiunti CSP, HSTS, COOP, CORP

[build]
  publish = "."

# Pretty URLs: serve /contatti.html anche su /contatti
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

# ============================================================
# SECURITY HEADERS - applicati a tutte le pagine
# ============================================================
[[headers]]
  for = "/*"
  [headers.values]
    # Forza HTTPS per 2 anni con preload (anti-MITM)
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    
    # Anti-clickjacking
    X-Frame-Options = "DENY"
    
    # Anti-MIME-sniffing
    X-Content-Type-Options = "nosniff"
    
    # Privacy: invia referrer solo a stesso dominio
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Restrizione API browser
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=()"
    
    # Cross-origin isolation
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Resource-Policy = "same-site"
    
    # Content Security Policy - permette: self, font Google, immagini, connect Supabase
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://okasxfvoyihovohlaypz.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://*.netlify.app https://cristianbresadola.com; object-src 'none'; upgrade-insecure-requests"

# ============================================================
# CACHE - asset statici cache lunga (immutable)
# ============================================================
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ============================================================
# PAGES SPECIFICHE
# ============================================================
# Pagina disiscrizione: noindex
[[headers]]
  for = "/disiscritto.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Pagina grazie post-form: noindex
[[headers]]
  for = "/grazie.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
